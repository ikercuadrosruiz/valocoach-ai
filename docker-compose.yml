version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: valocoach_db
    restart: always
    environment:
      POSTGRES_USER: valocoach
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: valocoach_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: valocoach_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: